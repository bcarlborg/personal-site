  <body>
    <div class="theme-switcher">
  <label class="theme-switcher-label">Theme:</label>
  <select id="theme-select">
    <option value="mistyrose">Mistyrose</option>
    <option value="midnight-flora">Midnight Flora</option>
  </select>
</div>

<script>
(function() {
  var themes = {
    'mistyrose': {
      '--color-text': '#1a1a1a',
      '--color-title': '#d2c4ff',
      '--color-bg': '#ffe4e1',
      '--color-metadata': '#ffd4d4',
      '--color-link': '#8c2626',
      '--color-code-bg': '#fecbcb',
      '--color-tag-writing': '#d2c4ff',
      '--color-tag-project': '#c4e0d2',
      '--color-tag-reading': '#c4d4e8'
    },
    'midnight-flora': {
      '--color-text': '#e8dcc8',
      '--color-title': '#4a3666',
      '--color-bg': '#1e1528',
      '--color-metadata': '#2a1f38',
      '--color-link': '#d4a0d0',
      '--color-code-bg': '#2a1f38',
      '--color-tag-writing': '#4a3666',
      '--color-tag-project': '#1e3a2a',
      '--color-tag-reading': '#1e2a3a'
    }
  };

  function applyTheme(name) {
    var vars = themes[name];
    if (!vars) return;
    Object.keys(vars).forEach(function(v) {
      document.documentElement.style.setProperty(v, vars[v]);
    });
    
    document.querySelectorAll('.theme-picker input[type="color"]').forEach(function(input) {
      if (vars[input.dataset.var]) input.value = vars[input.dataset.var];
    });
  }

  var select = document.getElementById('theme-select');
  var saved = localStorage.getItem('theme');
  if (saved && themes[saved]) {
    select.value = saved;
    applyTheme(saved);
  }

  select.addEventListener('change', function() {
    localStorage.setItem('theme', select.value);
    applyTheme(select.value);
  });
})();
</script>
